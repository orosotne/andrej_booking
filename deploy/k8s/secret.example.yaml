# TEMPLATE ONLY — never commit real secrets. Use Sealed Secrets / SOPS / External
# Secrets Operator in production. Create the namespace first: kubectl create ns ambulance
apiVersion: v1
kind: Secret
metadata:
  name: andrej-booking-env
  namespace: ambulance
type: Opaque
stringData:
  # Use the Neon POOLED connection string (host contains "-pooler") for serverless/many pods.
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST-pooler.eu-central-1.aws.neon.tech/neondb?sslmode=require"
  AUTH_SECRET: "REPLACE — openssl rand -base64 32"
  CRON_SECRET: "REPLACE — openssl rand -hex 24"
  CLINIC_TIMEZONE: "Europe/Bratislava"
