apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: andrej-booking
  namespace: ambulance
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ambulancia.example.sk
      secretName: andrej-booking-tls
  rules:
    - host: ambulancia.example.sk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: andrej-booking
                port:
                  number: 80
