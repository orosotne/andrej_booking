name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Quality gate. Vercel handles deployment via its Git integration; this pipeline
# guarantees lint/type/test/build pass before code reaches production.
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Dummy build-time values — the build is fully dynamic and never connects
      # to a DB. Real secrets live in Vercel project settings.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      AUTH_SECRET: ci-build-secret-not-used-at-runtime
      CRON_SECRET: ci-cron-secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      # `npm ci` runs the postinstall `prisma generate`.
      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
